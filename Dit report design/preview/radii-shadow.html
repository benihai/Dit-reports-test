<!doctype html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#fff; font-family:var(--font-sans);}
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;}
  .demo { background:#fff; border:1px solid var(--line-1); padding:14px; display:flex; flex-direction:column; align-items:center; gap:10px;}
  .swatch { width:90px; height:50px; background:#FAFAF8; border:1px solid var(--line-1);}
  .name { font-family:var(--font-mono); font-size:11px; color:var(--fg-3);}
  .shadow-1 { box-shadow: 0 1px 2px rgba(26,26,26,.06);}
  .shadow-2 { box-shadow: 0 2px 8px rgba(26,26,26,.08);}
  .shadow-3 { box-shadow: 0 8px 24px rgba(26,26,26,.10);}
  .shadow-f { box-shadow: 0 0 0 3px rgba(140,198,63,.35);}
</style>
</head>
<body>
  <div class="grid">
    <div class="demo"><div class="swatch" style="border-radius:0"></div><div class="name">r-0 · 0px</div></div>
    <div class="demo"><div class="swatch" style="border-radius:4px"></div><div class="name">r-1 · 4px</div></div>
    <div class="demo"><div class="swatch" style="border-radius:8px"></div><div class="name">r-2 · 8px</div></div>
    <div class="demo"><div class="swatch" style="border-radius:999px; width:60px;"></div><div class="name">r-pill</div></div>

    <div class="demo"><div class="swatch shadow-1" style="border:none; background:#fff;"></div><div class="name">shadow-1</div></div>
    <div class="demo"><div class="swatch shadow-2" style="border:none; background:#fff;"></div><div class="name">shadow-2</div></div>
    <div class="demo"><div class="swatch shadow-3" style="border:none; background:#fff;"></div><div class="name">shadow-3</div></div>
    <div class="demo"><div class="swatch shadow-f" style="background:#fff;"></div><div class="name">focus ring</div></div>
  </div>
</body>
</html>
