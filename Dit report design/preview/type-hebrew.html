<!doctype html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 26px; background:#fff;}
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
  .blk { border:1px solid var(--line-1); border-radius:8px; padding:14px 16px;}
  .blk h4 { margin:0 0 6px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3); font-weight:600; letter-spacing:.06em; text-transform:uppercase;}
  .heebo { font-family:'Heebo',sans-serif; font-weight:800; font-size:24px; color:#1A1A1A; line-height:1.2;}
  .assistant { font-family:'Assistant',sans-serif; font-weight:500; font-size:16px; color:#3A3A3A; line-height:1.55;}
  .alef { color: var(--dit-green-700); }
</style>
</head>
<body>
  <div class="grid">
    <div class="blk">
      <h4>Heebo · Display</h4>
      <div class="heebo"><span class="alef">א</span>ב ג ד ה ו ז ח ט י</div>
      <div class="heebo">בקרת איכות באתר</div>
      <div style="font-family:'Heebo';font-size:13px;color:#6B6B6B;margin-top:6px;">300 · 400 · 500 · 600 · 700 · 800 · 900</div>
    </div>
    <div class="blk">
      <h4>Assistant · Body</h4>
      <div class="assistant">המפקח אישר את הליקויים שנצפו ביציקה.</div>
      <div class="assistant" style="font-weight:700;">קבלן הראשי: אחים לוי בע"מ</div>
      <div style="font-family:'Assistant';font-size:13px;color:#6B6B6B;margin-top:6px;">300 · 400 · 500 · 600 · 700 · 800</div>
    </div>
  </div>
</body>
</html>
