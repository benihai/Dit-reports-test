<!doctype html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    margin:0; padding:24px; background:#fff; font-family:var(--font-sans);
  }
  .wrap {
    /* transparent checkerboard — shows the logo has no background */
    background-color: #fff;
    background-image:
      linear-gradient(45deg, #EFEEEA 25%, transparent 25%),
      linear-gradient(-45deg, #EFEEEA 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #EFEEEA 75%),
      linear-gradient(-45deg, transparent 75%, #EFEEEA 75%);
    background-size: 18px 18px;
    background-position: 0 0, 0 9px, 9px -9px, -9px 0;
    border: 1px solid var(--line-1);
    border-radius: 8px;
    height: 150px;
    display:flex; align-items:center; justify-content:center;
  }
  .wrap img {
    max-height: 110px;
    width: auto;
    display:block;
  }
  .caption {
    position:absolute; top:32px; right:36px;
    font-family: var(--font-mono);
    font-size:11px; color:var(--fg-3);
    background:#fff; padding:3px 8px; border-radius:4px;
    border:1px solid var(--line-1);
  }
  .holder { position:relative; }
</style>
</head>
<body>
  <div class="holder">
    <div class="wrap">
      <img src="../assets/dit-logo.png" alt="DIT — Design It Right">
    </div>
    <span class="caption">PNG · transparent</span>
  </div>
</body>
</html>
