<!doctype html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family:var(--font-sans);}
  .scale { display:flex; align-items:flex-end; gap:12px;}
  .step { display:flex; flex-direction:column; align-items:center; gap:6px;}
  .bar  { background:#EDF6DC; border:1px solid #BCDE85; border-radius:4px; width:48px;}
  .name { font-family:var(--font-mono); font-size:11px; color:var(--fg-3);}
  .val  { font-family:var(--font-mono); font-size:11px; color:var(--fg-1); font-weight:700;}
</style>
</head>
<body>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px;"></div><div class="name">s-1</div><div class="val">4</div></div>
    <div class="step"><div class="bar" style="height:8px;"></div><div class="name">s-2</div><div class="val">8</div></div>
    <div class="step"><div class="bar" style="height:12px;"></div><div class="name">s-3</div><div class="val">12</div></div>
    <div class="step"><div class="bar" style="height:16px;"></div><div class="name">s-4</div><div class="val">16</div></div>
    <div class="step"><div class="bar" style="height:20px;"></div><div class="name">s-5</div><div class="val">20</div></div>
    <div class="step"><div class="bar" style="height:24px;"></div><div class="name">s-6</div><div class="val">24</div></div>
    <div class="step"><div class="bar" style="height:32px;"></div><div class="name">s-8</div><div class="val">32</div></div>
    <div class="step"><div class="bar" style="height:40px;"></div><div class="name">s-10</div><div class="val">40</div></div>
    <div class="step"><div class="bar" style="height:48px;"></div><div class="name">s-12</div><div class="val">48</div></div>
    <div class="step"><div class="bar" style="height:64px;"></div><div class="name">s-16</div><div class="val">64</div></div>
    <div class="step"><div class="bar" style="height:80px;"></div><div class="name">s-20</div><div class="val">80</div></div>
  </div>
</body>
</html>
